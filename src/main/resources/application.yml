spring:
  application:
    name: java-ai-agent-lab
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9000/.well-known/jwks.json}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
